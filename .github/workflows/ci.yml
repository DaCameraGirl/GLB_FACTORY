name: Continuous Integration

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Types & Lint
        run: npm run lint

      - name: Build Application
        run: npm run build
