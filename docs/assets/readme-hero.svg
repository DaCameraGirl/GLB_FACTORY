<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="GLB_FACTORY — 3D Photo-to-Avatar Studio">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140d0a"/>
      <stop offset="45%" stop-color="#0a0709"/>
      <stop offset="100%" stop-color="#0d0a14"/>
    </linearGradient>
    <radialGradient id="glowAmber" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="92%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRose" cx="8%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3ede7"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#2a2230" stroke-width="1" opacity="0.45"/>
    </pattern>
    <clipPath id="round">
      <rect width="1200" height="280" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="280" fill="url(#sky)"/>
    <rect width="1200" height="280" fill="url(#glowAmber)"/>
    <rect width="1200" height="280" fill="url(#glowViolet)"/>
    <rect width="1200" height="280" fill="url(#glowRose)"/>
    <rect width="1200" height="280" fill="url(#grid)" opacity="0.55"/>

    <ellipse cx="600" cy="300" rx="520" ry="120" fill="#f59e0b" opacity="0.04"/>
    <ellipse cx="980" cy="40" rx="180" ry="80" fill="#a78bfa" opacity="0.06"/>

    <text x="600" y="118" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5" fill="url(#titleGrad)">GLB_FACTORY</text>
    <text x="600" y="158" text-anchor="middle" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#a99e93">Photo in. 3D avatar out. Zero backend required.</text>

    <rect x="330" y="182" width="540" height="2" rx="1" fill="#2a2230"/>
    <rect x="430" y="182" width="340" height="2" rx="1" fill="#f59e0b" opacity="0.7">
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="4s" repeatCount="indefinite"/>
    </rect>

    <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#a99e93">
      <text x="600" y="218" text-anchor="middle">Upload a portrait · Auto-detect face &amp; colors · Export a real GLB</text>
      <text x="600" y="244" text-anchor="middle" fill="#f59e0b" opacity="0.9">Gemini-powered on a server · Client-side fallback on GitHub Pages</text>
    </g>

    <circle cx="108" cy="72" r="3" fill="#f59e0b" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1092" cy="208" r="2.5" fill="#a78bfa" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="2" fill="#fb7185" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="64" r="2" fill="#f59e0b" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
